name: "Publish Release"

on:
  push:
    branches:
      - main 

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install frontend dependencies
        run: npm install

      - name: build frontend
        run: npm run build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__ #crea el tag automáticamente
          releaseName: "App v__VERSION__"
          includeUpdaterJson: true
          releaseBody: "- Nuevo sistema de actualización automática con notificación visual\n- Modal profesional con notas del parche al actualizar\n- Descarga en segundo plano si eliges actualizar después\n- Instalación automática al cerrar la aplicación\n- Verificación de actualizaciones cada 8 horas\n- Se modifica el nombre de la app a StockBeauty y se actualiza la versión a 1.0.1\n- Se soluciona el error cerrar correctamente la aplicación en windows"
          releaseDraft: false
          prerelease: false
