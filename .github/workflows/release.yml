name: "Publish Release"

on:
  push:
    branches:
      - main 

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install frontend dependencies
        run: npm install

      - name: build frontend
        run: npm run build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__ #crea el tag automáticamente
          releaseName: "App v__VERSION__"
          includeUpdaterJson: true
          releaseBody: "- Nueva edición de perfil con recorte de foto para ajustar tu imagen antes de guardarla\n- En ventas, ahora puedes registrar y ver también el apellido del cliente para identificar mejor cada operación\n- Se mejoró la visualización de reportes con un acordeón más ordenado, limpio y consistente\n- Ajustes en botones y espaciados dentro de reportes y modales para una experiencia más clara\n- Mejoras generales de estabilidad y consistencia visual en la aplicación"
          releaseDraft: false
          prerelease: false
