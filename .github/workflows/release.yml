name: "Publish Release"

on:
  push:
    branches:
      - main 

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install frontend dependencies
        run: npm install

      - name: build frontend
        run: npm run build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__ #crea el tag automáticamente
          releaseName: "App v__VERSION__"
          includeUpdaterJson: true
          releaseBody: "- Nuevo esquema de doble precio por producto: precio consultora (costo) y precio público (venta)\n- Migración de base de datos y normalización automática para mantener compatibilidad con datos legacy\n- Formularios de productos actualizados para crear y editar ambos precios sin romper el flujo existente\n- Tabla de productos mejorada para mostrar precio consultora y precio público con layout estable\n- Ventas actualizadas para tomar precio público en carrito, subtotal y payload de guardado\n- Reportes refinados: ingresos por precio público, valor de inventario por precio consultora y KPIs con formato de miles\n- Exportación Excel actualizada para mostrar ambos precios en productos y referencia de precios en productos vendidos\n- Mejoras de validación y robustez en backend para evitar inconsistencias de precios"
          releaseDraft: false
          prerelease: false
