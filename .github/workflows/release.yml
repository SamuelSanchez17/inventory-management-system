name: "Publish Release"

on:
  push:
    branches:
      - main 

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install frontend dependencies
        run: npm install

      - name: build frontend
        run: npm run build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__ #crea el tag automáticamente
          releaseName: "App v__VERSION__"
          includeUpdaterJson: true
          releaseBody: "- Reorganización visual del sistema para una navegación más clara entre módulos\n- La tabla de productos se integra en la sección Products para centralizar su gestión\n- Dashboard (Main Menu) optimizado: se elimina contenido no esencial para dejar una vista principal más limpia\n- Corrección de títulos en páginas principales (Dashboard, Products, Sales y Reports) para mantener consistencia tipográfica\n- Ajuste de encabezados y subtítulos para mejorar jerarquía visual y lectura entre pantallas\n- Mejoras generales de coherencia visual durante la paginación y el cambio de secciones"
          releaseDraft: false
          prerelease: false
